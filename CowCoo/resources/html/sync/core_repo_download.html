    <style>
      @font-face {
        font-family: 'Noto Sans SC';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('{{ResPool_Res_Path}}fonts/noto-sans/NotoSansSC-Regular.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Orbitron';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('{{ResPool_Res_Path}}fonts/orbitron/Orbitron-Regular.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Orbitron';
        font-style: normal;
        font-weight: 500;
        font-display: swap;
        src: url('{{ResPool_Res_Path}}fonts/orbitron/Orbitron-Medium.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Orbitron';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url('{{ResPool_Res_Path}}fonts/orbitron/Orbitron-Bold.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Rajdhani';
        font-style: normal;

        src: url('{{ResPool_Res_Path}}fonts/rajdhani/Rajdhani-Medium.woff2') format('woff2');
      }

        font-family: 'Rajdhani';
        font-style: normal;

      }
      :root {
        --bg-color: #212428;
        --container-bg: #212428;
        --item-bg: #2d3039;
        --text-primary: #ffffff;
        --text-secondary: #a7a9ad;
        --accent-color: #43d8b8;
        --accent-blue: rgba(59, 130, 246, 0.28);
        --accent-blue-mid: rgba(96, 165, 250, 0.2);
        --accent-purple: rgba(139, 92, 246, 0.28);
        --accent-purple-mid: rgba(167, 139, 250, 0.2);
        --accent-blue-dark: #3b82f6;
        --accent-purple-dark: #8b5cf6;
        --success-blue: rgba(60, 179, 113, 0.25);
        --success-purple: rgba(87, 217, 163, 0.25);
        --success-blue-dark: #3cb371;
        --success-purple-dark: #57d9a3;
        --accent-glow: rgba(67, 216, 184, 0.15);
        --accent-glow-mid: rgba(67, 216, 184, 0.35);
        --accent-glow-strong: rgba(67, 216, 184, 0.6);
        --accent-glow-secondary: rgba(0, 170, 255, 0.12);
        --success-color: #3cb371;
        --success-glow: rgba(60, 179, 113, 0.15);
        --success-glow-mid: rgba(60, 179, 113, 0.35);
        --success-glow-strong: rgba(60, 179, 113, 0.6);
        --success-glow-secondary: rgba(87, 217, 163, 0.12);
        --progress-color-from: #43d8b8;
        --progress-color-to: #00aaff;
        --progress-glow-color: rgba(67, 216, 184, 0.4);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Noto Sans SC", sans-serif;
        color: var(--text-primary);
        padding: 7px;
        width: 392px;
        margin: 14px auto;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        
      }

      .container-shadow-wrapper {
        position: relative;
        z-index: 2;
        filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
        animation: fadeIn 0.6s ease-out;
        padding: 4px;
      }

      .container {
        background: #0f0f1a;
        border-radius: 17px;
        position: relative;
        overflow: hidden;
        text-align: center;
        padding: 21px 28px;
        box-shadow:
          0 6px 22px rgba(0, 0, 0, 0.6),
          0 0 21px var(--accent-blue),
          0 0 42px var(--accent-purple),
          inset 0 0 14px var(--accent-purple-mid);
        border: 1px solid #2a2a3e;
        transition:
          box-shadow 0.4s,
          border-color 0.4s;
      }

      .container.status-complete {
        --accent-blue: var(--success-blue);
        --accent-purple: var(--success-purple);
        --accent-blue-mid: var(--success-purple);
        --accent-purple-mid: var(--success-blue);
        --accent-color: var(--success-color);
        --progress-color-from: #3cb371;
        --progress-color-to: #57d9a3;
        --progress-glow-color: rgba(60, 179, 113, 0.5);
        border-color: #1a3a2a;
      }

      .bg-rays {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
        opacity: 0.9;
        filter: contrast(1.4) brightness(1.2);
      }

      .container > *:not(.bg-rays) {
        position: relative;
        z-index: 1;
      }

      .header {
        margin-bottom: 18px;
      }

      .title {
        font-size: 20px;
        font-weight: 700;
        color: var(--text-primary);
        margin: 0 0 4px 0;
        letter-spacing: 1px;
      }

      .subtitle {
        font-size: 11px;
        color: var(--text-secondary);
        margin: 0;
      }

      .node-info {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1px;
        color: #ffffff;
        margin-bottom: 18px;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        padding: 4px 10px;
        display: inline-block;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-top: 1px solid rgba(255, 255, 255, 0.15);
        position: relative;
        overflow: hidden;
        border-radius: 4px;
      }

      .node-info strong {
        font-family: "Orbitron", sans-serif;
        color: var(--accent-color);
        transition: color 0.4s;
      }

      .progress-area {
        position: relative;
        margin-bottom: 18px;
      }

      .progress-bar-container {
        height: 17px;
        background-color: var(--item-bg);
        border-radius: 4px;
        overflow: hidden;
        box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .progress-bar-fill {
        height: 100%;
        border-radius: 4px;
        background: linear-gradient(
          90deg,
          var(--progress-color-from),
          var(--progress-color-to)
        );
        box-shadow: 0 0 8px var(--progress-glow-color);
        transition:
          width 0.4s ease-out,
          background 0.4s,
          box-shadow 0.4s;
        position: relative;
        overflow: hidden;
      }

      .progress-bar-fill::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: repeating-linear-gradient(
          -45deg,
          transparent,
          transparent 3px,
          rgba(255, 255, 255, 0.1) 3px,
          rgba(255, 255, 255, 0.1) 4px
        );
      }

      .progress-percentage {
        font-family: "Orbitron", sans-serif;
        font-size: 45px;
        font-weight: 700;
        color: #9494A4;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        line-height: 1;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
        mix-blend-mode: overlay;
        opacity: 0.7;
      }

      .status-message {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-primary);
        height: 19px;
      }

      .footer {
        margin-top: 18px;
        padding-top: 11px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        font-size: 9px;
        font-family: "Orbitron", monospace;
        color: var(--text-secondary);
      }
    </style>
  </head>
